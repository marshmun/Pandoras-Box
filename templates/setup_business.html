<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Business - Inventory Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .business-types {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .business-type-btn {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .business-type-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .business-type-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .business-type-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .business-type-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .business-type-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        .business-type-btn.selected .business-type-desc {
            opacity: 0.9;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Setup Your Business</h1>
            <p class="subtitle">Tell us about your business</p>

            <div class="error" id="errorMessage"></div>

            <form id="setupForm">
                <div class="form-group">
                    <label for="businessName">Business Name</label>
                    <input type="text" id="businessName" name="businessName" placeholder="e.g., My Snack Bar" required>
                </div>

                <label style="margin-bottom: 15px; display: block;">Business Type</label>
                <div class="business-types">
                    <div class="business-type-btn" data-type="snack_bar">
                        <div class="business-type-icon">🍕</div>
                        <div class="business-type-name">Snack Bar</div>
                        <div class="business-type-desc">Inventory & sales tracking</div>
                    </div>
                    <div class="business-type-btn" data-type="retail">
                        <div class="business-type-icon">🛒</div>
                        <div class="business-type-name">Retail Shop</div>
                        <div class="business-type-desc">Stock & profit analysis</div>
                    </div>
                    <div class="business-type-btn" data-type="service">
                        <div class="business-type-icon">🔧</div>
                        <div class="business-type-name">Service Business</div>
                        <div class="business-type-desc">Hours & mileage tracking</div>
                    </div>
                    <div class="business-type-btn" data-type="other">
                        <div class="business-type-icon">📊</div>
                        <div class="business-type-name">Other</div>
                        <div class="business-type-desc">Custom tracking</div>
                    </div>
                </div>

                <input type="hidden" id="businessType" name="businessType" required>

                <button type="submit" id="submitBtn">
                    <div class="button-content">
                        <span>Continue</span>
                    </div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const businessTypeButtons = document.querySelectorAll('.business-type-btn');
        const businessTypeInput = document.getElementById('businessType');
        const form = document.getElementById('setupForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMessage');

        businessTypeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                businessTypeButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                businessTypeInput.value = btn.dataset.type;
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!businessTypeInput.value) {
                errorDiv.textContent = 'Please select a business type';
                errorDiv.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="button-content"><div class="loader"></div>Setting up...</div>';

            try {
                const response = await fetch('/setup-business', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        business_name: document.getElementById('businessName').value,
                        business_type: businessTypeInput.value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorDiv.textContent = data.error || 'Setup failed';
                    errorDiv.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<div class="button-content"><span>Continue</span></div>';
                }
            } catch (error) {
                errorDiv.textContent = 'An error occurred. Please try again.';
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<div class="button-content"><span>Continue</span></div>';
            }
        });
    </script>
</body>
</html>
